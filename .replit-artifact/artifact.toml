kind = "web"
previewPath = "/pyramic/"
title = "Pyramic — AI Travel Concierge"
version = "1.0.0"
id = "artifacts/pyramic"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21113
name = "web"
paths = ["/pyramic/"]

[services.development]
run = "pnpm --filter @workspace/pyramic run dev"

[services.env]
PORT = "21113"
BASE_PATH = "/pyramic/"

[services.production]
build = ["pnpm", "--filter", "@workspace/pyramic", "run", "build"]
publicDir = "artifacts/pyramic/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
