    description: "Deep navy blue dark background with subtle glowing cherry pink and spring green floating particles, luxury cinematic, abstract 3d rendering"
    aspect_ratio: "16:9"
  - path: "artifacts/pyramic/public/images/flight-scenic.png"
    description: "View from an airplane window over a stunning sunset cloudscape, dark dramatic lighting, luxury travel aesthetic"
    aspect_ratio: "3:4"
  - path: "artifacts/pyramic/public/images/hotel-luxury.png"
    description: "Luxury hotel room interior at night with city skyline view, warm ambient lighting, modern minimalist design"
    aspect_ratio: "3:4"
  - path: "artifacts/pyramic/public/images/taxi-transfer.png"
    description: "Sleek black luxury sedan driving through neon-lit city streets at night, cinematic motion blur, high-end automotive photography"
    aspect_ratio: "3:4"
  - path: "artifacts/pyramic/public/images/tour-experience.png"
    description: "Travelers exploring an exotic ancient street market at dusk, warm glowing lanterns, cinematic travel photography"
    aspect_ratio: "3:4"
  - path: "artifacts/pyramic/public/images/train-scenic.png"
    description: "Modern high speed sleek train traveling through dramatic mountains at twilight, luxury aesthetic"
    aspect_ratio: "3:4"
  - path: "artifacts/pyramic/public/images/bus-coach.png"
    description: "Premium modern travel coach bus parked near a scenic coastal overlook at sunset, dark sleek aesthetic"
